<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Ratatoskr Web</title>
    <script>
      (function () {
        function computeCellGrid() {
          // Mobile cell grid: 48 cols below 768px (Frost canon).
          // Tablet+desktop: 178 cols.
          var targetCols = window.innerWidth < 768 ? 48 : 178;
          var ch = Math.max(window.innerWidth / targetCols, 6); // clamp at 6px floor for very narrow viewports
          var r = document.documentElement.style;
          r.setProperty('--ch',        ch + 'px');
          r.setProperty('--char',      ch + 'px');
          r.setProperty('--col',       ch + 'px');
          r.setProperty('--line',      (ch * 2) + 'px');
          r.setProperty('--font-size', (ch / 0.6 - 0.9) + 'px');
          for (var i = 1; i <= 8; i++) {
            r.setProperty('--strip-' + i, (ch * 22 * i) + 'px');
          }
        }
        computeCellGrid();
        window.addEventListener('resize', computeCellGrid);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
