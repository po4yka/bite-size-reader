# Grafana dashboard provisioning for Ratatoskr

apiVersion: 1

providers:
  - name: 'Ratatoskr Dashboards'
    orgId: 1
    folder: 'Ratatoskr'
    folderUid: 'ratatoskr'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
