# Pi-specific compose overrides.
#
# Official Qdrant Docker images crash on Raspberry Pi 5 due to a jemalloc
# incompatibility with the 16KB memory page size.  On the Pi, Qdrant is
# built from source and runs as a native systemd service on port 6333.
# This overlay redirects all services to the host-native Qdrant and marks
# the qdrant compose service as optional so the bot starts without it.
#
# Usage (Pi only):
#   docker compose \
#     -f ops/docker/docker-compose.yml \
#     -f ops/docker/docker-compose.pi.yml \
#     up -d ratatoskr mobile-api

services:
  ratatoskr:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      qdrant:
        condition: service_started
        required: false

  mobile-api:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      qdrant:
        condition: service_started
        required: false

  mcp:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  mcp-write:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  mcp-public:
    environment:
      - QDRANT_URL=http://host-gateway:6333
    extra_hosts:
      - "host-gateway:host-gateway"

  qdrant:
    # Assign to a profile that is never activated so this service is excluded
    # when running with the Pi overlay.  The depends_on entries above use
    # required: false so dependents start even when this service is absent.
    profiles:
      - disabled-on-pi
