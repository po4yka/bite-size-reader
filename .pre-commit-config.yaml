default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile=black"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        additional_dependencies: []
        args:
          - --no-incremental
          - --cache-dir=/dev/null
          - --pretty
          - --show-error-codes
          - --ignore-missing-imports
          - --no-warn-unused-ignores

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.1
    hooks:
      - id: markdownlint-cli2
        name: Lint Markdown files
        args: ["--fix"]

  - repo: local
    hooks:
      - id: class-loc-limit
        name: Disallow classes > 1000 LOC
        entry: python tools/scripts/check_class_size.py --max-loc 1000 --baseline tools/scripts/class_size_baseline.json
        language: python
        types: [python]
      - id: file-loc-limit
        name: Disallow files > 1500 LOC
        entry: python tools/scripts/check_file_size.py --max-loc 1500 --baseline tools/scripts/file_size_baseline.json
        language: python
      # Regenerates clients/web/src/api/generated.ts whenever the OpenAPI YAML
      # is in the staged file set, then re-stages the result so the commit
      # captures it. Without this hook, generated.ts drifts from mobile_api.yaml
      # between PRs and is only caught later by the web-static-check CI job.
      - id: regenerate-openapi-types
        name: Regenerate clients/web/src/api/generated.ts from mobile_api.yaml
        entry: bash -c 'cd clients/web && npm run --silent generate:api && cd ../.. && git add clients/web/src/api/generated.ts'
        language: system
        files: ^docs/openapi/mobile_api\.yaml$
        pass_filenames: false
