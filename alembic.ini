[alembic]
script_location = app/db/alembic
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is overridden at runtime by env.py (DB_PATH env var or
# programmatic set_main_option).  The sentinel value sqlite:/// tells env.py
# that no URL has been set, so it falls through to DB_PATH → production default.
sqlalchemy.url = sqlite:///

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
