[alembic]
script_location = app/db/alembic
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is overridden at runtime by env.py from DB_PATH env var.
# Set it here only as a fallback for offline --sql mode.
sqlalchemy.url = sqlite:////data/ratatoskr.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
