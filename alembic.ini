[alembic]
script_location = app/db/alembic
version_locations = %(here)s/app/db/alembic/versions
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is normally overridden by DATABASE_URL or programmatic
# cfg.set_main_option("sqlalchemy.url", dsn).  The sentinel value tells env.py
# to fail with a clear error if no Postgres URL is available.
sqlalchemy.url = postgresql+asyncpg://

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
