name: Dependency Review

on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # The action requires Dependency Graph to be enabled on the repository.
    # Until it is, allow the job to fail without blocking PRs (otherwise
    # every PR is "unstable" with no path to green).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
